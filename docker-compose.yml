version: '3.8'

services:
  # ==========================================================
  # 1. PostgreSQL Database Service
  # ==========================================================
  db:
    image: postgres:16-alpine
    container_name: lifelink-postgres
    restart: always
    environment:
      POSTGRES_USER: lifelink_user
      POSTGRES_PASSWORD: secure_db_password
      POSTGRES_DB: lifelink_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - lifelink-net
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lifelink_user -d lifelink_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ==========================================================
  # 2. Redis Cache Service
  # ==========================================================
  redis:
    image: redis:7-alpine
    container_name: lifelink-redis
    restart: always
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    networks:
      - lifelink-net
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ==========================================================
  # 3. Node.js Full-Stack Application Service
  # ==========================================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lifelink-app
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=lifelink_user
      - DB_PASSWORD=secure_db_password
      - DB_NAME=lifelink_db
      - DATABASE_URL=postgresql://lifelink_user:secure_db_password@db:5432/lifelink_db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_URL=redis://redis:6379
      # Note: GEMINI_API_KEY should be passed from environment or .env file at launch
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - APP_URL=${APP_URL:-http://localhost}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - lifelink-net
    expose:
      - "3000"

  # ==========================================================
  # 4. Nginx Reverse Proxy Server
  # ==========================================================
  nginx:
    image: nginx:alpine
    container_name: lifelink-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Optional: uncomment if SSL certificates are mounted for TLS termination
      # - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - app
    networks:
      - lifelink-net

# ==========================================================
# Volume & Network Configuration
# ==========================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  lifelink-net:
    driver: bridge
