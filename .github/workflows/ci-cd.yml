name: LifeLink AI CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # ==========================================================
  # Job 1: Build, Lint & Verify Code Integrity
  # ==========================================================
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Set up Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Application Dependencies
        run: npm ci

      - name: Execute TypeScript Compiler Type Checking
        run: npm run lint

      - name: Compile Static Assets and Server Bundle
        run: npm run build

  # ==========================================================
  # Job 2: Build & Push Docker Image (CD Segment)
  # ==========================================================
  build-and-push:
    needs: verify
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Set up QEMU (Multi-platform Builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub Registry
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate Short SHA Tag
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/lifelink-app:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/lifelink-app:${{ steps.vars.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==========================================================
  # Job 3: Continuous Deployment (CD) via SSH
  # ==========================================================
  deploy:
    needs: build-and-push
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: Execute Remote SSH Deploy Script
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USERNAME }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            echo "Starting secure CD deployment for LifeLink AI..."
            cd /opt/lifelink-dispatch || exit 1
            
            # Pull the latest Docker images from the Hub registry
            docker compose pull app
            
            # Upgrade and reload containers with minimal downtime (rolling update style)
            docker compose up -d --no-deps --build app
            
            # Prune obsolete dangling images
            docker image prune -f
            
            echo "LifeLink AI Deployment completed successfully!"
